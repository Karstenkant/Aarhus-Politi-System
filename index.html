<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Politi MDT System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Politi MDT System</h1>
        <nav>
            <button id="loginBtn">Login</button>
            <button id="logoutBtn" style="display:none;">Log ud</button>
        </nav>
    </header>

    <main>
        <!-- Login -->
        <div id="loginDiv">
            <h2>Login</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button id="loginSubmit">Log ind</button>
            <p id="loginMessage"></p>
        </div>

        <!-- Admin Panel -->
        <div id="adminDiv" style="display:none;">
            <h2>Admin Panel</h2>
            <input type="email" id="newOfficerEmail" placeholder="Betjente Email">
            <input type="password" id="newOfficerPassword" placeholder="Password">
            <button id="createOfficer">Opret Betjent</button>
            <p id="adminMessage"></p>
        </div>

        <!-- MDT Dashboard -->
        <div id="mdtDiv" style="display:none;">
            <h2>MDT Dashboard</h2>
            <button id="newCaseBtn">Opret Sag</button>
            <div id="casesList"></div>
        </div>

        <!-- Create Case Modal -->
        <div id="caseModal" style="display:none;">
            <h3>Opret Sag</h3>
            <input type="text" id="caseName" placeholder="Sag Navn">
            <select id="crimeSelect"></select>
            <button id="createCase">Gem Sag</button>
            <button id="cancelCase">Annuller</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
